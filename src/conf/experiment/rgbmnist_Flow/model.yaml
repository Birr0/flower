code_dim: 64
lightning_loader:
  _target_: flower.models.rgbmnist.LightningFlowMatching
  base_model:
    _target_: flower.models.rgbmnist.VAE
    hidden_dim: ${code_dim}
  lr: 0.0001
  code_dim: ${code_dim}
  hidden_dim: 256
  catalog: ${data.y_catalog}
  batch_size: ${data.loader.batch_size}
  base_model_ckpt_path: ${meta.vae_ckpt_path}
  beta_start_step: 0
  beta_warmup_steps: 10000
  max_beta: 1.0
  n_steps: 20

model_checkpoint: # this can be more general. Import from checkpoints and change monitor.
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${paths.experiment_path}/ckpts/
  save_top_k: 1
  filename: ${hydra:job.id}
  monitor: val_loss
  mode: min

early_stopping:
  _target_: lightning.pytorch.callbacks.EarlyStopping
  monitor: val_loss
  patience: 100
  min_delta: 0.00001
  mode: min

trainer:
  logger:
    - ${logger.wandb}
    - ${logger.csv}

  callbacks:
    - ${...model_checkpoint}
    - ${...early_stopping}

trainer_ckpt_path: null # resume training from this checkpoint if avaialble

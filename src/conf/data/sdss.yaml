x_ds:
  dataset_name: "sdss"
  fp: ${meta.data_path}
  type: "spectra"
  augmentations: none #${..augmentations}
  size: 3921

y_catalog:
  catalog_name: "sdss"
  fp: null
  join_method: "concat"
  variables:
    Z:
      name: "redshift"
      size: 1
      processing_fn: null
  drop_variables: '[]'

loader:
  _target_: flower.data.modules.FlowerDataLoader
  datasets:
    train:
      _target_: flower.data.sdss.SDSS
      split: "train"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
    val:
      _target_: flower..data.sdss.SDSS
      split: "val"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
    test:
      _target_: flower..data.sdss.SDSS
      split: "test"
      x_ds: ${....x_ds}
      y_catalog: ${....y_catalog}
  batch_size: 512
  random_state: ${seed}
  shuffle: true
  num_workers: 24